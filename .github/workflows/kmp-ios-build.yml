name: KMP iOS Build

on:
  push:
    branches:
      - feature/ios-kmp-mvp
      - main
  pull_request:
  workflow_dispatch:

jobs:
  shared-ios:
    name: Build shared iOS framework
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build KMP shared frameworks
        run: |
          chmod +x ./gradlew
          ./gradlew \
            :shared:compileKotlinMetadata \
            :shared:linkDebugFrameworkIosSimulatorArm64 \
            :shared:linkReleaseFrameworkIosArm64

      - name: Upload frameworks
        uses: actions/upload-artifact@v5
        with:
          name: Han1meShared-frameworks
          path: |
            shared/build/bin/iosSimulatorArm64/debugFramework/
            shared/build/bin/iosArm64/releaseFramework/
          if-no-files-found: error

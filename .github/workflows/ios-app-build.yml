name: iOS App Build

on:
  push:
    branches:
      - feature/ios-kmp-mvp
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ios-app:
    name: Build SwiftUI app with KMP framework
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Cache Kotlin/Native (~/.konan)
        # konan home holds the Kotlin/Native compiler distribution (~250 MB) and
        # platform LLVM caches that take ~100s to redownload+regenerate on every
        # cold run. setup-gradle only caches ~/.gradle, not ~/.konan, so we
        # cache it explicitly here. Key on Kotlin/AGP/library versions because
        # konan is tied to the kotlin compiler version.
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', '**/build.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            build/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned device app
        run: |
          # Stamp the IPA with a dev marker + short commit hash so the
          # Settings → 关于 page shows e.g. "dev (8d7c017)" instead of the
          # static project.yml default "1.0 (1)". Real releases overwrite
          # these in release.yml with the tag version + run number.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          xcodebuild \
            -project Han1meViewer.xcodeproj \
            -scheme Han1meViewer \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            -jobs "$(sysctl -n hw.ncpu)" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            MARKETING_VERSION="dev" \
            CURRENT_PROJECT_VERSION="${SHORT_SHA}" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(pwd)/build/Build/Products/Debug-iphoneos/Han1meViewer.app"
          IPA_DIR="$(pwd)/build/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          /usr/bin/zip -qry Han1meViewer-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v6
        with:
          name: Han1meViewer-unsigned-ipa
          path: build/ipa/Han1meViewer-unsigned.ipa
          if-no-files-found: error

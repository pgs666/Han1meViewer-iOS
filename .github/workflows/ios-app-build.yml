name: iOS App Build

on:
  push:
    branches:
      - feature/ios-kmp-mvp
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ios-app:
    name: Build SwiftUI app with KMP framework
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          xcodebuild \
            -project Han1meViewer.xcodeproj \
            -scheme Han1meViewer \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

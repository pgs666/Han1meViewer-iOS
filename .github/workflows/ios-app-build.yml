name: iOS App Build

on:
  push:
    branches:
      - feature/ios-kmp-mvp
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ios-app:
    name: Build SwiftUI app with KMP framework
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned device app
        run: |
          xcodebuild \
            -project Han1meViewer.xcodeproj \
            -scheme Han1meViewer \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(pwd)/build/Build/Products/Debug-iphoneos/Han1meViewer.app"
          IPA_DIR="$(pwd)/build/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          /usr/bin/zip -qry Han1meViewer-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v5
        with:
          name: Han1meViewer-unsigned-ipa
          path: build/ipa/Han1meViewer-unsigned.ipa
          if-no-files-found: error

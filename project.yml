name: Han1meViewer
options:
  bundleIdPrefix: com.yenaly
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "$(IOS_DEVELOPMENT_TEAM)"
    CODE_SIGNING_ALLOWED: "NO"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.8.0"
targets:
  Han1meViewer:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yenaly.han1meviewer.ios
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/Han1meViewer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -lsqlite3
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - framework: shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Han1meShared.framework
        embed: true
        codeSign: false
    preBuildScripts:
      - name: Build KMP Shared Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT"
          chmod +x ./gradlew
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

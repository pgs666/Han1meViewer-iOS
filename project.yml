name: Han1meViewer
options:
  bundleIdPrefix: com.yenaly
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "16.0"
knownRegions:
  - en
  - zh-Hans
  - zh-Hant
  - Base
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "$(IOS_DEVELOPMENT_TEAM)"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.8.0"
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main
targets:
  Han1meViewer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yenaly.han1meviewer.ios
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/Han1meViewer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -lsqlite3
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: KSPlayer
        product: KSPlayer
      - framework: shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Han1meShared.framework
        embed: true
        codeSign: false
    preBuildScripts:
      - name: Build KMP Shared Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT"
          chmod +x ./gradlew
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
    postBuildScripts:
      - name: Fix invalid framework bundle ids (KSPlayer/libshaderc_combined etc.)
        basedOnDependencyAnalysis: false
        script: |
          # Some frameworks shipped via KSPlayer (e.g. libshaderc_combined) have
          # CFBundleIdentifier with underscores, which violates RFC 1034 / Apple
          # framework validation. Replace any underscores with hyphens in
          # embedded frameworks' Info.plist.
          APP_FRAMEWORKS="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Frameworks"
          if [ ! -d "$APP_FRAMEWORKS" ]; then
            echo "No Frameworks directory at $APP_FRAMEWORKS, skipping"
            exit 0
          fi
          for framework in "$APP_FRAMEWORKS"/*.framework; do
            plist="$framework/Info.plist"
            if [ ! -f "$plist" ]; then continue; fi
            current_id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" 2>/dev/null || true)
            if [ -z "$current_id" ]; then continue; fi
            case "$current_id" in
              *_*)
                fixed=$(echo "$current_id" | tr '_' '-')
                /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $fixed" "$plist"
                echo "Fixed CFBundleIdentifier in $(basename "$framework"): $current_id -> $fixed"
                ;;
            esac
          done

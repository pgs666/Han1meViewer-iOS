name: Han1meViewer
options:
  bundleIdPrefix: com.yenaly
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: "NO"
packages: {}
targets:
  Han1meViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yenaly.han1meviewer.ios
        INFOPLIST_FILE: iosApp/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -lsqlite3
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    dependencies:
      - framework: shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Han1meShared.framework
        embed: true
        codeSign: false
    preBuildScripts:
      - name: Build KMP Shared Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT"
          chmod +x ./gradlew
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
